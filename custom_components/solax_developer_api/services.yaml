manual_refresh:
  name: Manual Refresh
  description: Trigger an immediate refresh for all configured SolaX Developer API entries.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id; if omitted, all entries are refreshed.
      example: "1234567890abcdef"

start_live_view:
  name: Start Live View
  description: Enable temporary realtime-focused polling with an automatic timeout.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"
    duration_seconds:
      name: Duration (seconds)
      description: Optional live mode duration override.
      example: 300
    interval_seconds:
      name: Target Interval (seconds)
      description: Optional live mode target interval override.
      example: 5

stop_live_view:
  name: Stop Live View
  description: Disable live polling and return to standard/night profile timing.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"

list_history_devices:
  name: List History Devices
  description: List currently discovered devices that can be queried by the Developer API history endpoint. Does not call the SolaX API.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id. If omitted, all loaded entries are included.
      example: "1234567890abcdef"

list_plant_statistics_targets:
  name: List Plant Statistics Targets
  description: List currently discovered plants that can be queried by the Developer API plant statistics endpoint. Does not call the SolaX API.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id. If omitted, all loaded entries are included.
      example: "1234567890abcdef"

list_alarm_targets:
  name: List Alarm Targets
  description: List currently discovered plants and devices that can be queried by the Developer API alarm endpoint. Does not call the SolaX API.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id. If omitted, all loaded entries are included.
      example: "1234567890abcdef"

fetch_device_history:
  name: Fetch Device History
  description: Read historical telemetry from the Developer API and cache the result. Long time ranges are automatically split into API-safe windows.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"
    sn_list:
      name: Device Serial List
      description: Device SN list, min 1 max 200. Requests are chunked automatically.
      required: true
      example: ["X3******01"]
    device_type:
      name: Device Type
      description: 1 inverter, 2 battery, 3 meter, 4 EV charger.
      required: true
      example: 1
    business_type:
      name: Business Type
      description: 1 residential, 4 commercial & industrial.
      required: true
      example: 1
    start_time:
      name: Start Time
      description: 13-digit UTC unix milliseconds.
      required: true
      example: 1742918400000
    end_time:
      name: End Time
      description: 13-digit UTC unix milliseconds.
      required: true
      example: 1742972400000
    time_interval:
      name: Time Interval
      description: 5, 10, 15, 30, 60 minutes.
      required: true
      example: 60
    request_sn_type:
      name: Request SN Type
      description: Optional battery query mode (1 inverter SN / 2 battery SN).
      example: 1

fetch_plant_year_statistics:
  name: Fetch Plant Year Statistics
  description: Read monthly plant statistics for one year from the Developer API. Display-only; does not write to Home Assistant Recorder.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"
    plant_id:
      name: Plant ID
      description: Plant ID returned by list_plant_statistics_targets.
      required: true
      example: "1981342105221492737"
    business_type:
      name: Business Type
      description: 1 residential, 4 commercial & industrial.
      required: true
      example: 1
    year:
      name: Year
      description: Calendar year to fetch. Current year fetches year-to-date; previous years fetch all 12 months.
      required: true
      example: 2026

fetch_plant_month_statistics:
  name: Fetch Plant Month Statistics
  description: Read daily plant statistics for one month from the Developer API. Display-only; does not write to Home Assistant Recorder.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"
    plant_id:
      name: Plant ID
      description: Plant ID returned by list_plant_statistics_targets.
      required: true
      example: "1981342105221492737"
    business_type:
      name: Business Type
      description: 1 residential, 4 commercial & industrial.
      required: true
      example: 1
    year:
      name: Year
      description: Calendar year to fetch.
      required: true
      example: 2026
    month:
      name: Month
      description: Calendar month to fetch, 1-12. Future months in the current year are rejected.
      required: true
      example: 6

fetch_alarm_information:
  name: Fetch Alarm Information
  description: Read paged alarm information from the Developer API. Display-only; does not write to Home Assistant Recorder.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"
    plant_id:
      name: Plant ID
      description: Optional plant ID returned by list_alarm_targets. If omitted, all loaded plants are queried.
      example: "1981342105221492737"
    business_type:
      name: Business Type
      description: Optional business type for explicit plant queries. 1 residential, 4 commercial & industrial.
      example: 1
    alarm_state:
      name: Alarm State
      description: Alarm state filter. Use all, ongoing, closed, 1, or 0.
      example: "all"
    device_sn:
      name: Device SN
      description: Optional device serial filter.
      example: "X3******01"
    max_pages:
      name: Maximum Pages
      description: Maximum pages to fetch per plant and alarm state, 1-100.
      example: 20

query_request_result:
  name: Query Request Result
  description: Query asynchronous command request status by string requestId.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"
    request_id:
      name: Request ID
      description: Request ID returned by a control API call. String and numeric inputs are accepted.
      required: true
      example: "661234567890"

query_master_control_device:
  name: Query Master Control Device
  description: Read the top-level master control device (C&I only, businessType=4).
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"
    device_sn:
      name: Device SN
      required: true
      example: "10H1******020C"
    device_type:
      name: Device Type
      required: true
      example: 1
    business_type:
      name: Business Type
      description: Must be 4 (commercial & industrial).
      required: true
      example: 4

set_export_control:
  name: Set Export Control (Dry-Run)
  description: Dry-run only. Validates payload and blocks write execution.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"
    sn_list:
      name: Device Serial List
      description: Required. Device SN list. Runtime validation allows 1 to 10 serials.
      required: true
      example: ["X3******01"]
    device_type:
      name: Device Type
      description: Required. Developer API device type, for example 1 inverter.
      required: true
      example: 1
    is_enable:
      name: Enable Flag
      description: Required. Integer payload field used by dry-run validation.
      required: true
      example: 1
    limit_value:
      name: Limit Value
      description: Required. Export limit in kW; decimal values with up to two places are supported.
      required: true
      example: 1.25
    business_type:
      name: Business Type
      description: Required. 1 residential or 4 commercial & industrial.
      required: true
      example: 1
    control_mode:
      name: Control Mode
      description: Optional. Integer payload field used by dry-run validation.
      example: 1
