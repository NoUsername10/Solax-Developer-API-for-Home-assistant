set_battery_heating:
  name: Battery Heating Settings (Dry-Run)
  description: Dry-run only. Validates battery heating settings and blocks write execution.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"
    sn_list:
      name: Device Serial List
      description: Required. Device SN list, minimum 1 and maximum 10.
      required: true
      example: ["X3******01"]
    heating_enable:
      name: Heating Enable
      description: Required. 0 disables battery heating; 1 enables it.
      required: true
      example: 1
    heating_level:
      name: Heating Level
      description: Required when enabled. Supported values are 0, 1, and 2.
      example: 1
    heating_period1_start_time:
      name: Heating Period 1 Start
      description: Required when enabled. HH:MM time value.
      example: "06:00"
    heating_period1_end_time:
      name: Heating Period 1 End
      description: Required when enabled and must be later than period 1 start.
      example: "09:00"
    heating_period2_start_time:
      name: Heating Period 2 Start
      description: Optional second heating period start. HH:MM time value.
      example: "17:00"
    heating_period2_end_time:
      name: Heating Period 2 End
      description: Required when period 2 start is supplied.
      example: "20:00"
    business_type:
      name: Business Type
      description: Required. 1 residential or 4 commercial & industrial.
      required: true
      example: 1
set_ems_manual_mode:
  name: EMS Manual Mode (Dry-Run)
  description: Dry-run only. Validates EMS manual-mode settings and blocks write execution.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id.
      example: "1234567890abcdef"
    device_type:
      name: Device Type
      description: Required. Fixed value 100 for EMS System.
      required: true
      example: 100
    business_type:
      name: Business Type
      description: Required. Fixed value 4 for commercial & industrial EMS systems.
      required: true
      example: 4
    param_list:
      name: EMS Parameters
      description: Required. List of 1 to 10 EMS objects with registerNo, manualMode, and conditional power/targetSoc.
      required: true
      example:
        - registerNo: "XM******01"
          manualMode: 1
          power: 100
          targetSoc: 80
