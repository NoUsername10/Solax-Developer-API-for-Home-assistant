<svg width="820" height="165" viewBox="0 0 820 165" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="820" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F7FA"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(82 35) rotate(31) scale(230 110)">
      <stop stop-color="#FFBA00" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFBA00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(735 35) rotate(151) scale(220 105)">
      <stop stop-color="#1565C0" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#1565C0" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="26" y="18" width="768" height="129" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0B1A2A" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 760 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; letter-spacing: -0.2px; }
      .time { font: 850 23px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; letter-spacing: -0.8px; }
      .detail { font: 400 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6b7280; }
      .pill { font: 800 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="820" height="165" rx="26" fill="#EEF2F6"/>
  <g filter="url(#shadow)">
    <rect x="58" y="42" width="704" height="82" rx="22" fill="url(#cardBg)" stroke="#DCE3EA"/>
    <rect x="58" y="42" width="704" height="82" rx="22" fill="url(#sunGlow)"/>
    <rect x="58" y="42" width="704" height="82" rx="22" fill="url(#blueGlow)"/>
  </g>

  <g transform="translate(82 62)">
    <rect width="42" height="42" rx="14" fill="#FFF4CC" stroke="#F7C948" stroke-opacity="0.78"/>
    <circle cx="21" cy="21" r="12" stroke="#FFB300" stroke-width="3"/>
    <path d="M21 13V21L27 24" stroke="#FFB300" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="142" y="82" class="title">SolaX Live View</text>
  <text x="320" y="82" class="time">1m 58s</text>
  <text x="142" y="103" class="detail">Heartbeat 3s ago</text>

  <g transform="translate(639 64)">
    <rect width="100" height="36" rx="18" fill="#F8FAFC" stroke="#DCE3EA"/>
    <circle cx="19" cy="18" r="5" fill="#43A047"/>
    <circle cx="19" cy="18" r="11" fill="#43A047" opacity="0.12"/>
    <text x="36" y="23" class="pill">ACTIVE</text>
  </g>
</svg>
