<svg width="820" height="620" viewBox="0 0 820 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="820" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F7FA"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(132 70) rotate(49) scale(250 178)">
      <stop stop-color="#FFBA00" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FFBA00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(718 92) rotate(133) scale(260 190)">
      <stop stop-color="#1565C0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#1565C0" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="20" y="20" width="780" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0B1A2A" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 26px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; }
      .sub { font: 400 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6b7280; }
      .pill { font: 800 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; letter-spacing: 1.1px; }
      .label { font: 800 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6b7280; letter-spacing: 1.1px; }
      .huge { font: 800 56px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; letter-spacing: -3px; }
      .profile { font: 800 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; }
      .metricLabel { font: 800 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6b7280; }
      .metricValue { font: 800 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; }
      .metricHelp { font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6b7280; }
      .footer { font: 400 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6b7280; }
      .footerStrong { font: 800 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect width="820" height="620" rx="30" fill="#EEF2F6"/>
  <g filter="url(#shadow)">
    <rect x="60" y="50" width="700" height="505" rx="24" fill="url(#cardBg)" stroke="#DCE3EA"/>
    <rect x="60" y="50" width="700" height="505" rx="24" fill="url(#sunGlow)"/>
    <rect x="60" y="50" width="700" height="505" rx="24" fill="url(#blueGlow)"/>
  </g>

  <g transform="translate(86 82)">
    <rect x="0" y="0" width="54" height="54" rx="18" fill="#FFF4CC" stroke="#F7C948" stroke-opacity="0.75"/>
    <path d="M27 10C18.7 10 12 16.7 12 25C12 33.3 18.7 40 27 40C35.3 40 42 33.3 42 25C42 16.7 35.3 10 27 10ZM27 14C33.1 14 38 18.9 38 25C38 31.1 33.1 36 27 36C20.9 36 16 31.1 16 25C16 18.9 20.9 14 27 14Z" fill="#FFB300"/>
    <path d="M27 18V25L33 28" stroke="#FFB300" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="154" y="105" class="title">SolaX Live View</text>
  <text x="154" y="130" class="sub">Keeps Developer API Live View active while this dashboard is open.</text>

  <g transform="translate(626 86)">
    <rect width="108" height="36" rx="18" fill="#F8FAFC" stroke="#DCE3EA"/>
    <circle cx="19" cy="18" r="5" fill="#43A047"/>
    <circle cx="19" cy="18" r="11" fill="#43A047" opacity="0.12"/>
    <text x="36" y="23" class="pill">ACTIVE</text>
  </g>

  <text x="86" y="188" class="label">LIVE VIEW REMAINING</text>
  <text x="86" y="245" class="huge">1m 58s</text>

  <g transform="translate(592 190)">
    <rect width="142" height="48" rx="15" fill="#E9F2FF" stroke="#C7DCF5"/>
    <text x="71" y="30" text-anchor="middle" class="profile">live view</text>
  </g>

  <g transform="translate(86 286)">
    <rect width="306" height="82" rx="16" fill="#F8FAFC" stroke="#DCE3EA"/>
    <text x="18" y="27" class="metricLabel">Target Interval</text>
    <text x="18" y="54" class="metricValue">5s</text>
    <text x="80" y="54" class="metricHelp">Requested card/service target</text>
  </g>
  <g transform="translate(414 286)">
    <rect width="306" height="82" rx="16" fill="#F8FAFC" stroke="#DCE3EA"/>
    <text x="18" y="27" class="metricLabel">Effective Interval</text>
    <text x="18" y="54" class="metricValue">5s</text>
    <text x="80" y="54" class="metricHelp">May be increased for API safety</text>
  </g>
  <g transform="translate(86 384)">
    <rect width="306" height="82" rx="16" fill="#F8FAFC" stroke="#DCE3EA"/>
    <text x="18" y="27" class="metricLabel">API Budget</text>
    <text x="18" y="54" class="metricValue">Normal</text>
    <text x="102" y="54" class="metricHelp">20 calls/min configured</text>
  </g>
  <g transform="translate(414 384)">
    <rect width="306" height="82" rx="16" fill="#F8FAFC" stroke="#DCE3EA"/>
    <text x="18" y="27" class="metricLabel">Last Heartbeat</text>
    <text x="18" y="54" class="metricValue">3s ago</text>
    <text x="112" y="54" class="metricHelp">Every 45s</text>
  </g>

  <line x1="86" y1="494" x2="734" y2="494" stroke="#DCE3EA"/>
  <text x="86" y="523" class="footer">Entity:</text>
  <text x="132" y="523" class="footerStrong">switch.sds_live_view_mode</text>
</svg>
